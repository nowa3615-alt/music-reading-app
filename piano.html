<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ピアノ譜読みトレーニング</title>
<style>
body{font-family:sans-serif;text-align:center;margin-top:40px}
button{font-size:18px;padding:8px 16px;margin:5px}
canvas{border:1px solid #ccc}
</style>
</head>

<body>

<h2>ピアノ譜読みトレーニング</h2>

<select id="level">
<option value="5">ド〜ソ</option>
<option value="8">ド〜高いド</option>
<option value="8_rhythm">ド〜高いド＋8分音符</option>
</select>

<br><br>

<canvas id="score" width="420" height="150"></canvas>

<br><br>

<button onclick="showAnswer()">答えを見る</button>
<button onclick="generate()">次のフレーズ</button>

<script>

const canvas = document.getElementById("score");
const ctx = canvas.getContext("2d");

const notePositions = [110,105,100,95,90,85,80,75];
const noteNames = ["ド","レ","ミ","ファ","ソ","ラ","シ","ド"];

let currentNotes = [];

function drawStaff(){

ctx.clearRect(0,0,420,150);

// 五線
for(let i=0;i<5;i++){
let y = 60 + i*10;
ctx.beginPath();
ctx.moveTo(40,y);
ctx.lineTo(400,y);
ctx.stroke();
}

// ト音記号
ctx.font = "50px serif";
ctx.fillText("𝄞", 10, 105);

// 拍子（4/4）
ctx.font = "20px sans-serif";
ctx.fillText("4", 50, 75);
ctx.fillText("4", 50, 95);

}

// 小節線
function drawBarLine(x){
ctx.beginPath();
ctx.moveTo(x,60);
ctx.lineTo(x,100);
ctx.stroke();
}

// 加線（ドのみ）
function drawLedgerLines(x,pos){
if(pos === 0){
ctx.beginPath();
ctx.moveTo(x-10,110);
ctx.lineTo(x+10,110);
ctx.stroke();
}
}

// 単体音符
function drawSingleNote(x,pos,type){

let y = notePositions[pos];

drawLedgerLines(x,pos);

// 音符
ctx.save();
ctx.translate(x,y);
ctx.rotate(-0.3);
ctx.beginPath();
ctx.ellipse(0,0,6,5,0,0,Math.PI*2);
ctx.fill();
ctx.restore();

// 符尾
let up = y > 90;

if(up){
ctx.beginPath();
ctx.moveTo(x+6,y);
ctx.lineTo(x+6,y-30);
ctx.stroke();

if(type === "eighth"){
ctx.beginPath();
ctx.moveTo(x+6,y-30);
ctx.lineTo(x+12,y-20);
ctx.stroke();
}

}else{
ctx.beginPath();
ctx.moveTo(x-6,y);
ctx.lineTo(x-6,y+30);
ctx.stroke();

if(type === "eighth"){
ctx.beginPath();
ctx.moveTo(x-6,y+30);
ctx.lineTo(x-12,y+20);
ctx.stroke();
}

}

}

// 🎵 斜めビーム
function drawBeamedPair(n1, n2){

let x1 = n1.x;
let x2 = n2.x;

let y1 = notePositions[n1.pos];
let y2 = notePositions[n2.pos];

// 音符
[n1,n2].forEach(n=>{
ctx.save();
ctx.translate(n.x, notePositions[n.pos]);
ctx.rotate(-0.3);
ctx.beginPath();
ctx.ellipse(0,0,6,5,0,0,Math.PI*2);
ctx.fill();
ctx.restore();
drawLedgerLines(n.x,n.pos);
});

// ビームの高さを斜めに
let stem1 = y1 - 30;
let stem2 = y2 - 30;

// 符尾
ctx.beginPath();
ctx.moveTo(x1+6,y1);
ctx.lineTo(x1+6,stem1);

ctx.moveTo(x2+6,y2);
ctx.lineTo(x2+6,stem2);
ctx.stroke();

// ビーム（斜め）
ctx.beginPath();
ctx.moveTo(x1+6,stem1);
ctx.lineTo(x2+6,stem2);
ctx.lineWidth = 4;
ctx.stroke();
ctx.lineWidth = 1;

}

// 描画まとめ
function drawNotesWithBeams(notes){

for(let i=0;i<notes.length;i++){

let n = notes[i];

if(n.type === "eighth" && i < notes.length-1 && notes[i+1].type === "eighth"){
drawBeamedPair(n, notes[i+1]);
i++;
}else{
drawSingleNote(n.x, n.pos, n.type);
}

}

}

// 🎵 音生成
function generatePitchSequence(length, max){

let phrase = [];
let current = Math.floor(Math.random()*max);
phrase.push(current);

let prevJump = 0;

for(let i=1;i<length;i++){

if(i === length-1){
current = 0;
phrase.push(current);
break;
}

if(current === 6 && Math.random()<0.7){
current = 7;
phrase.push(current);
continue;
}

if(prevJump !== 0){
current -= prevJump;
prevJump = 0;
}else{

let r = Math.random();

if(r < 0.7){
current += (Math.random()<0.5 ? -1 : 1);
}
else if(r < 0.9){
}
else{
let jump = (Math.random()<0.5 ? -2 : 2);
current += jump;
prevJump = jump;
}

}

if(current < 0) current = 0;
if(current >= max) current = max-1;

phrase.push(current);
}

return phrase;
}

// リズム
function generateRhythm(){

let rhythm = [];

for(let i=0;i<4;i++){

if(Math.random() < 0.4){
rhythm.push("eighth","eighth");
}else{
rhythm.push("quarter");
}

}

return rhythm;
}

// メイン
function generate(){

drawStaff();

let level = document.getElementById("level").value;

let notes = [];
let x = 80;
let beatWidth = 70;
let beatCount = 0;

if(level === "8_rhythm"){

let rhythm = generateRhythm();
let pitches = generatePitchSequence(rhythm.length, 8);

for(let i=0;i<rhythm.length;i++){

if(rhythm[i] === "eighth" && rhythm[i+1] === "eighth"){

notes.push({pos:pitches[i], x:x, type:"eighth"});
notes.push({pos:pitches[i+1], x:x + beatWidth/2, type:"eighth"});

i++;
x += beatWidth;
beatCount++;

}else{

notes.push({pos:pitches[i], x:x, type:"quarter"});
x += beatWidth;
beatCount++;

}

// 小節線（4拍ごと）
if(beatCount === 4){
drawBarLine(x-10);
beatCount = 0;
}

}

}else{

let max = parseInt(level);
let pitches = generatePitchSequence(4, max);

for(let i=0;i<4;i++){
notes.push({pos:pitches[i], x:80+i*70, type:"quarter"});
}

drawBarLine(80 + 4*70 - 10);

}

currentNotes = notes;
drawNotesWithBeams(notes);

}

// 答え
function showAnswer(){

ctx.font = "12px sans-serif";

for(let n of currentNotes){
let y = notePositions[n.pos];
ctx.fillText(noteNames[n.pos], n.x-6, y-10);
}

}

generate();

</script>

</body>
</html>
